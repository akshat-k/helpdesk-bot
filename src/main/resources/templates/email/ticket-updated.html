<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; color: #333; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; padding: 0; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
        .header { background: #0d47a1; color: white; padding: 24px; }
        .header h2 { margin: 0; font-size: 18px; }
        .body { padding: 24px; }
        .field { display: flex; margin: 10px 0; border-bottom: 1px solid #f5f5f5; padding-bottom: 10px; }
        .label { font-weight: bold; color: #555; min-width: 110px; font-size: 13px; }
        .value { color: #222; font-size: 13px; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .priority-HIGH { background: #ff6b35; color: white; }
        .priority-URGENT { background: #d32f2f; color: white; }
        .priority-MEDIUM { background: #f57c00; color: white; }
        .priority-LOW { background: #388e3c; color: white; }
        .status-badge { background: #e3f2fd; color: #0d47a1; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .footer { background: #f9f9f9; padding: 16px 24px; font-size: 11px; color: #999; border-top: 1px solid #eee; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>🔄 Ticket Updated</h2>
        <p style="margin:6px 0 0 0; font-size:13px; opacity:0.8">Here are the latest details for your ticket.</p>
    </div>
    <div class="body">
        <div class="field">
            <span class="label">Ticket ID</span>
            <span class="value">#<span th:text="${ticketId}"/></span>
        </div>
        <div class="field">
            <span class="label">Title</span>
            <span class="value" th:text="${title}"/>
        </div>
        <div class="field">
            <span class="label">Description</span>
            <span class="value" th:text="${description}"/>
        </div>
        <div class="field">
            <span class="label">Priority</span>
            <span class="badge" th:classappend="'priority-' + ${priority}" th:text="${priority}"/>
        </div>
        <div class="field">
            <span class="label">Status</span>
            <span class="status-badge" th:text="${status}"/>
        </div>
        <div class="field">
            <span class="label">Assignee</span>
            <span class="value" th:text="${assignee}"/>
        </div>
        <div class="field">
            <span class="label">Updated At</span>
            <span class="value" th:text="${occurredAt}"/>
        </div>
    </div>
    <div class="footer">
        This is an automated message from NovaDesk. Do not reply to this email.
        For urgent issues contact <a th:href="'mailto:' + ${supportEmail}" th:text="${supportEmail}"/>.
    </div>
</div>
</body>
</html>
