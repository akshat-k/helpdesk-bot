<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; color: #333; }
        .container { max-width: 600px; margin: 40px auto; padding: 24px; border: 1px solid #e0e0e0; border-radius: 8px; }
        .header { background: #1b5e20; color: white; padding: 20px; border-radius: 6px 6px 0 0; }
        .footer { margin-top: 24px; font-size: 12px; color: #999; border-top: 1px solid #eee; padding-top: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h2 style="margin:0">✅ Ticket Resolved — NovaDesk</h2></div>
    <div style="padding: 20px 0">
        <p>Great news! Ticket <strong>#<span th:text="${ticketId}"/></strong> — <span th:text="${title}"/> has been resolved.</p>
        <p>If your issue persists, please open a new ticket and reference <strong>#<span th:text="${ticketId}"/>.</strong></p>
    </div>
    <div class="footer">Automated message from NovaDesk.</div>
</div>
</body>
</html>
